services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Одноразово применяет миграции Alembic; bot и web ждут его успешного завершения.
  migrate:
    build: .
    image: tutorai:local
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./secrets:/secrets:ro
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  bot:
    image: tutorai:local
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./secrets:/secrets:ro
    # api.telegram.org из YC резолвится в IPv6 (у VM его нет) и в IPv4 149.154.166.110
    # (фильтруется) → бот падает на таймауте. Прибиваем имя к рабочему IPv4 Telegram
    # (проверено: 149.154.167.220 отдаёт Bot API; та же схема живёт у vedomost-ai).
    # Если этот IP перестанет отвечать — подобрать другой живой A-адрес Telegram
    # (getent ahosts / curl --resolve api.telegram.org:443:<ip>) или задать TELEGRAM_PROXY.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    command: ["python", "-m", "app.main"]

  # Веб-панель академического руководителя (управление ролями).
  web:
    image: tutorai:local
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "${WEB_PORT:-8080}:8080"
    command: ["uvicorn", "app.web.main:app", "--host", "0.0.0.0", "--port", "8080"]

volumes:
  postgres-data:
