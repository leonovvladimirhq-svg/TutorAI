#cloud-config
# Стартовая настройка VM: Docker + клонирование репозитория.
# Секреты (.env, secrets/sa-key.json) НЕ хранятся в репозитории — заливаются отдельно (scp).
package_update: true
packages:
  - ca-certificates
  - curl
  - git
runcmd:
  # Официальный скрипт Docker — устойчивее ручной настройки apt-репозитория
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - git clone https://github.com/leonovvladimirhq-svg/TutorAI.git /opt/tutorai
  - mkdir -p /opt/tutorai/secrets
  - 'echo "VM готова. Залейте .env и secrets/sa-key.json в /opt/tutorai, затем: cd /opt/tutorai && docker compose up -d --build" > /opt/tutorai/NEXT_STEPS.txt'
